<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y-MindMap - 主题 Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .header { background: white; border-bottom: 1px solid #ddd; padding: 16px 24px; }
    .header h1 { font-size: 24px; color: #333; }
    .nav { display: flex; gap: 12px; margin-top: 12px; }
    .nav a { padding: 8px 16px; background: #4A90D9; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; }
    .nav a:hover { background: #357ABD; }
    .nav a.active { background: #2C5F8A; }
    .container { padding: 24px; }
    .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .theme-btn { padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; text-align: center; transition: all 0.2s; }
    .theme-btn:hover { border-color: #4A90D9; }
    .theme-btn.active { border-color: #4A90D9; background: #e3f2fd; }
    .theme-btn .preview { display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; }
    .theme-btn .preview div { width: 20px; height: 20px; border-radius: 4px; }
    .theme-btn .name { font-size: 14px; color: #333; }
    #app { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); height: calc(100vh - 250px); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Y-MindMap - 主题 Demo</h1>
    <div class="nav">
      <a href="/">基础</a>
      <a href="/richtext.html">富文本</a>
      <a href="/collaboration.html">协作</a>
      <a href="/templates.html">模板</a>
      <a href="/themes.html" class="active">主题</a>
      <a href="/layouts.html">布局</a>
      <a href="/ai.html">AI</a>
    </div>
  </div>
  <div class="container">
    <div class="theme-grid" id="theme-grid"></div>
    <div id="app"></div>
  </div>
  <script type="module" src="./src/themes.ts"></script>
</body>
</html>
