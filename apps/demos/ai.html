<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y-MindMap - AI Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .header { background: white; border-bottom: 1px solid #ddd; padding: 16px 24px; }
    .header h1 { font-size: 24px; color: #333; }
    .nav { display: flex; gap: 12px; margin-top: 12px; }
    .nav a { padding: 8px 16px; background: #4A90D9; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; }
    .nav a:hover { background: #357ABD; }
    .nav a.active { background: #2C5F8A; }
    .container { padding: 24px; display: flex; gap: 24px; }
    .editor-container { flex: 1; }
    .sidebar { width: 400px; }
    #app { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); height: calc(100vh - 200px); }
    .panel { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 16px; margin-bottom: 16px; }
    .panel h3 { margin-bottom: 12px; color: #333; }
    .btn { padding: 8px 16px; background: #4A90D9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 8px; margin-bottom: 8px; }
    .btn:hover { background: #357ABD; }
    .output { background: #f5f5f5; border-radius: 4px; padding: 12px; margin-top: 12px; font-size: 14px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Y-MindMap - AI Demo</h1>
    <div class="nav">
      <a href="/">基础</a>
      <a href="/richtext.html">富文本</a>
      <a href="/collaboration.html">协作</a>
      <a href="/templates.html">模板</a>
      <a href="/themes.html">主题</a>
      <a href="/layouts.html">布局</a>
      <a href="/ai.html" class="active">AI</a>
    </div>
  </div>
  <div class="container">
    <div class="editor-container">
      <div id="app"></div>
    </div>
    <div class="sidebar">
      <div class="panel">
        <h3>状态描述</h3>
        <button class="btn" id="btn-describe">描述当前状态</button>
        <div class="output" id="describe-output"></div>
      </div>
      <div class="panel">
        <h3>智能建议</h3>
        <button class="btn" id="btn-suggest">获取建议</button>
        <div class="output" id="suggest-output"></div>
      </div>
      <div class="panel">
        <h3>结构查询</h3>
        <button class="btn" id="btn-query-children">查询子节点</button>
        <button class="btn" id="btn-query-depth">查询深度</button>
        <button class="btn" id="btn-query-empty">查询空节点</button>
        <div class="output" id="query-output"></div>
      </div>
    </div>
  </div>
  <script type="module" src="./src/ai.ts"></script>
</body>
</html>
