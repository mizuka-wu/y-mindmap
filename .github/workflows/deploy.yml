name: Deploy Docs & Demo

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Build docs
        run: pnpm --filter @y-mindmap/docs build

      - name: Build demo
        run: pnpm --filter @y-mindmap/demo build

      - name: Build demos
        run: pnpm --filter @y-mindmap/demos build

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r apps/docs/.vitepress/dist/* _site/
          mkdir -p _site/demo
          cp -r apps/demo/dist/* _site/demo/
          mkdir -p _site/demos
          cp -r apps/demos/dist/* _site/demos/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
